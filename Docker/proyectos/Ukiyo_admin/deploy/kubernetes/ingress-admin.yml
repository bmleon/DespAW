apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-admin-ukiyo
  namespace: admin-ukiyo
spec:
  rules:
  - host: admin-ukiyo.ukiyocazorla.es
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: service-admin-ukiyo
            port:
              number: 80